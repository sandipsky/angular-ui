<header class="page-header">
  <h1 class="page-header__title">Password Input</h1>
  <p class="page-header__lead">
    Password field built on the shared <code>BaseInput</code>, with a lock icon and a
    show/hide toggle. Works with <code>[(ngModel)]</code> and reactive forms.
  </p>
</header>

<div class="stories">
  <app-story
    title="Basic"
    description="Label, placeholder, lock icon and visibility toggle."
    code='<l-password-input label="Password" placeholder="Enter your password" />'
  >
    <l-password-input label="Password" placeholder="Enter your password" />
  </app-story>

  <app-story
    title="Two-way binding — ngModel"
    description="Toggle visibility to reveal the typed value."
    code='<l-password-input label="Password" [(ngModel)]="value" />'
  >
    <div class="demo-col">
      <l-password-input label="Password" placeholder="Enter your password" [(ngModel)]="ngModelValue" />
      <p class="demo-readout">Value: {{ ngModelValue() || '—' }}</p>
    </div>
  </app-story>

  <app-story
    title="Reactive forms — formControl"
    description="Bind a FormControl directly."
    code='passwordControl = new FormControl("");

<l-password-input label="Password" [formControl]="passwordControl" />'
  >
    <div class="demo-col">
      <l-password-input label="Password" placeholder="Enter your password" [formControl]="passwordControl" />
      <p class="demo-readout">Control value: {{ passwordControl.value || '—' }}</p>
    </div>
  </app-story>

  <app-story
    title="Requirements checklist"
    description="Set [showRules] to display live-validating password rules. Type to see them turn valid."
    code='<l-password-input label="Password" [showRules]="true" />'
  >
    <div class="demo-col">
      <l-password-input label="Password" placeholder="Enter your password" [showRules]="true" />
    </div>
  </app-story>

  <app-story
    title="Disabled"
    description="Input and toggle are both disabled."
    code='<l-password-input label="Password" [disabled]="true" />'
  >
    <l-password-input label="Password" placeholder="Enter your password" [disabled]="true" />
  </app-story>
</div>
