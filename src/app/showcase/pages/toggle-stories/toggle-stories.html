<header class="page-header">
  <h1 class="page-header__title">Toggle</h1>
  <p class="page-header__lead">
    A boolean switch built on the shared slider styles. Binds with <code>[(ngModel)]</code> or a
    reactive <code>FormControl</code>, and the label can sit on either side via
    <code>labelPosition</code>.
  </p>
</header>

<div class="stories">
  <app-story
    title="Basic"
    description="Label sits on the right by default."
    code='<l-toggle label="Wi-Fi" />'
  >
    <l-toggle label="Wi-Fi" />
  </app-story>

  <app-story
    title="Label position"
    description="Place the label on the left or right of the switch."
    code='<l-toggle label="Left label" labelPosition="left" />
<l-toggle label="Right label" labelPosition="right" />'
  >
    <div class="demo-row">
      <l-toggle label="Left label" labelPosition="left" />
      <l-toggle label="Right label" labelPosition="right" />
    </div>
  </app-story>

  <app-story
    title="Two-way binding — ngModel"
    description="Bind the checked state with [(ngModel)]."
    code='<l-toggle label="Notifications" [(ngModel)]="enabled" />'
  >
    <div class="demo-col">
      <l-toggle label="Notifications" [(ngModel)]="ngModelValue" />
      <p class="demo-readout">Value: {{ ngModelValue() }}</p>
    </div>
  </app-story>

  <app-story
    title="Reactive forms — formControl"
    description="Bind a boolean FormControl directly."
    code='notificationsControl = new FormControl(false);

<l-toggle label="Email me" [formControl]="notificationsControl" />'
  >
    <div class="demo-col">
      <l-toggle label="Email me" [formControl]="notificationsControl" />
      <p class="demo-readout">Control value: {{ notificationsControl.value }}</p>
    </div>
  </app-story>

  <app-story
    title="Disabled"
    description="Non-interactive state."
    code='<l-toggle label="Disabled" [disabled]="true" />'
  >
    <l-toggle label="Disabled" [disabled]="true" />
  </app-story>
</div>
