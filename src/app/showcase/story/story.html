<section class="story">
  <header class="story__header">
    <h3 class="story__title">{{ title() }}</h3>
    @if (description()) {
      <p class="story__desc">{{ description() }}</p>
    }
  </header>

  <div class="story__canvas">
    <ng-content />
  </div>

  @if (code()) {
    <pre class="story__code"><code>{{ code() }}</code></pre>
  }
</section>
