<div class="form-group">
  @if (label()) {
    <label [attr.for]="id()">{{ label() }}</label>
  }

  <div class="input-wrapper">
    <span class="left-icon" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M5 6.66675L8.50929 8.42139C9.44771 8.8906 10.5523 8.8906 11.4907 8.42139L15 6.66675M5 15.8334H15C16.3807 15.8334 17.5 14.7141 17.5 13.3334V6.66675C17.5 5.28604 16.3807 4.16675 15 4.16675H5C3.61929 4.16675 2.5 5.28604 2.5 6.66675V13.3334C2.5 14.7141 3.61929 15.8334 5 15.8334Z"
          stroke="#646663"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>

    <input
      class="form-control"
      [class.error]="_invalid()"
      [id]="id()"
      [type]="type"
      [value]="_value()"
      [placeholder]="placeholder()"
      [disabled]="_isDisabled()"
      [attr.aria-invalid]="_invalid()"
      [attr.aria-describedby]="_invalid() ? id() + '-error' : null"
      (input)="_handleInput($event)"
      (change)="change.emit($event)"
      (keyup)="keyup.emit($event)"
      (keydown)="keydown.emit($event)"
      (keypress)="keypress.emit($event)"
      (keydown.enter)="_handleEnter($event)"
      (blur)="_handleBlur()"
    />
  </div>

  @if (_invalid()) {
    <span class="alert error" [id]="id() + '-error'">Please enter a valid email address.</span>
  }
</div>
