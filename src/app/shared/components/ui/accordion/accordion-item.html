<h3 class="l-accordion-item__heading">
  <button
    #header
    type="button"
    class="l-accordion-item__trigger"
    [class.icon-left]="_iconPosition() === 'left'"
    [disabled]="disabled()"
    [id]="id() + '-trigger'"
    [attr.aria-expanded]="_open()"
    [attr.aria-controls]="id() + '-panel'"
    (click)="_toggle()"
    (keydown)="_onKeydown($event)"
  >
    <span class="l-accordion-item__title">
      <ng-content select="[slot=title]">{{ title() }}</ng-content>
    </span>

    <svg
      class="l-accordion-item__chevron"
      width="16"
      height="16"
      viewBox="0 0 20 20"
      fill="none"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="M5 7.5L10 12.5L15 7.5"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
</h3>

<div
  class="l-accordion-item__panel"
  role="region"
  [id]="id() + '-panel'"
  [class.is-open]="_open()"
  [attr.aria-labelledby]="id() + '-trigger'"
  [attr.inert]="_open() ? null : ''"
>
  <div class="l-accordion-item__panel-inner">
    <div class="l-accordion-item__content">
      <ng-content />
    </div>
  </div>
</div>
