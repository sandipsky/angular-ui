@if (withIcon()) {
  <span class="l-notification__icon" aria-hidden="true">
    @switch (type()) {
      @case ('success') {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="currentColor" opacity="0.14" />
          <path d="M6 10.5 9 13.5 14.5 7" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      }
      @case ('error') {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="currentColor" opacity="0.14" />
          <path d="M7 7l6 6M13 7l-6 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
        </svg>
      }
      @case ('warn') {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="currentColor" opacity="0.14" />
          <path d="M10 5.5v5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
          <circle cx="10" cy="14" r="1" fill="currentColor" />
        </svg>
      }
      @default {
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="10" r="9" fill="currentColor" opacity="0.14" />
          <path d="M10 9.5v5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" />
          <circle cx="10" cy="6" r="1" fill="currentColor" />
        </svg>
      }
    }
  </span>
}

<div class="l-notification__body">
  @if (title()) {
    <p class="l-notification__title">{{ title() }}</p>
  }
  @if (message()) {
    <p class="l-notification__message">{{ message() }}</p>
  }
</div>

@if (showClose()) {
  <button type="button" class="l-notification__close" aria-label="Dismiss" (click)="_onClose()">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 5 5 15M5 5l10 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
    </svg>
  </button>
}

@if (duration() > 0) {
  <div class="l-notification__progress" [class.is-hidden]="!showProgress()">
    <span
      class="l-notification__progress-bar"
      [style.animation-duration.ms]="duration()"
      (animationend)="_onProgressEnd()"
    ></span>
  </div>
}
